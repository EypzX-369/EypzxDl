<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>eypzxdl</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
/>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
/>

<link
  href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0a0a0f;
  --surface:#12121a;
  --card:#1a1a26;
  --border:#2a2a3e;
  --accent:#7c6af7;
  --accent2:#f06292;
  --accent3:#4dd0e1;
  --text:#e8e6f0;
  --muted:#8884a0;
  --success:#66bb6a;
  --error:#ef5350;
  --mono:'DM Mono', monospace;
  --sans:'DM Sans', sans-serif;
  --display:'Syne', sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
}

.blob{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.12;
  pointer-events:none;
}

.blob-1{
  width:600px;
  height:600px;
  background:var(--accent);
  top:-200px;
  left:-200px;
}

.blob-2{
  width:500px;
  height:500px;
  background:var(--accent2);
  bottom:-150px;
  right:-150px;
}

.wrapper{
  position:relative;
  z-index:1;
  max-width:900px;
  margin:auto;
  padding:24px;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:24px 0;
  border-bottom:1px solid var(--border);
  margin-bottom:70px;
}

.logo{
  font-family:var(--display);
  font-size:1.4rem;
  font-weight:800;
}

.logo span{
  color:var(--accent);
}

.badge{
  font-family:var(--mono);
  font-size:.7rem;
  background:rgba(124,106,247,.15);
  border:1px solid rgba(124,106,247,.35);
  color:var(--accent);
  padding:4px 10px;
  border-radius:999px;
}

.hero{
  text-align:center;
  margin-bottom:50px;
}

.hero p{
  color:var(--muted);
  margin-top:14px;
}

.hero h1{
  font-family:var(--display);
  font-size:clamp(3rem,8vw,5rem);
  line-height:1;
  letter-spacing:-.04em;
  background:linear-gradient(
    135deg,
    #fff 20%,
    var(--accent) 60%,
    var(--accent2)
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.search-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:30px;
  margin-bottom:30px;
}

.input-row{
  display:flex;
  gap:14px;
}

#query{
  flex:1;
  padding:16px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  outline:none;
  font-size:1rem;
}

#query:focus{
  border-color:var(--accent);
}

.btn{
  border:none;
  cursor:pointer;
  border-radius:14px;
  padding:14px 24px;
  font-family:var(--display);
  font-weight:700;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn-primary{
  background:linear-gradient(
    135deg,
    var(--accent),
    #a78bfa
  );
  color:white;
}

.btn-download{
  background:linear-gradient(
    135deg,
    var(--success),
    #43a047
  );
  color:white;
}

.btn-outline{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}

#status-bar{
  display:none;
  margin-bottom:16px;
  padding:14px;
  border-radius:12px;
  font-size:.9rem;
}

.success{
  background:rgba(102,187,106,.12);
  color:var(--success);
  border:1px solid rgba(102,187,106,.3);
}

.error{
  background:rgba(239,83,80,.12);
  color:var(--error);
  border:1px solid rgba(239,83,80,.3);
}

.spinner-wrap{
  display:none;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:30px;
}

.spinner{
  width:24px;
  height:24px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

#result-card{
  display:none;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
}

.result-header{
  padding:18px;
  border-bottom:1px solid var(--border);
}

.song-info{
  display:none;
  gap:20px;
  align-items:center;
  padding:24px;
  border-bottom:1px solid var(--border);
}

.song-thumb{
  width:90px;
  height:90px;
  border-radius:14px;
  object-fit:cover;
}

.song-thumb-placeholder{
  width:90px;
  height:90px;
  border-radius:14px;
  background:linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
}

.song-actions{
  display:none;
  gap:12px;
  padding:24px;
  border-bottom:1px solid var(--border);
}

.json-viewer{
  padding:24px;
}

pre{
  overflow:auto;
  max-height:320px;
  font-family:var(--mono);
  color:#b8b5d0;
}

.playlist-track{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:rgba(255,255,255,.02);
}

.playlist-track p{
  color:var(--muted);
  font-size:.85rem;
}

#playlist-box{
  display:none;
  padding:24px;
  border-bottom:1px solid var(--border);
}

#playlist-tracks{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:20px;
}

footer{
  margin-top:60px;
  text-align:center;
  color:var(--muted);
  border-top:1px solid var(--border);
  padding-top:30px;
}

.json-key{
  color:#a78bfa;
}

.json-str{
  color:#86efac;
}

.json-num{
  color:#fbbf24;
}

.json-bool{
  color:var(--accent3);
}

.json-null{
  color:var(--muted);
}

@media(max-width:600px){

  .input-row{
    flex-direction:column;
  }

  .song-actions{
    flex-direction:column;
  }

  .playlist-track{
    flex-direction:column;
    align-items:flex-start;
  }
}

</style>

</head>

<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrapper">

<header>

<div class="logo">
  eypz<span>xdl</span>
</div>

<div class="badge">
  FREE · FAST
</div>

</header>

<section class="hero">

<h1>
  Download<br/>
  Any Song
</h1>

<p>
  Search songs, YouTube links or Spotify playlists instantly.
</p>

</section>

<div class="search-card">

<div class="input-row">

<input
  id="query"
  type="text"
  placeholder="Song name, YouTube URL or Spotify playlist..."
/>

<button
  class="btn btn-primary"
  id="download-btn"
  onclick="downloadSong()"
>
  Download
</button>

</div>

</div>

<div id="status-bar"></div>

<div class="spinner-wrap" id="spinner">

<div class="spinner"></div>

<span>
  Fetching...
</span>

</div>

<div id="result-card">

<div class="result-header">

eypzxdl — response

</div>

<div class="song-info" id="song-info">

<div
  class="song-thumb-placeholder"
  id="thumb-placeholder"
>
  🎵
</div>

<img
  class="song-thumb"
  id="song-thumb"
  src=""
  style="display:none;"
/>

<div>

<h2 id="song-title">
  Unknown Title
</h2>

<p id="song-artist">
  Unknown Artist
</p>

</div>

</div>

<div
  class="song-actions"
  id="song-actions"
>

<a
  class="btn btn-download"
  id="direct-dl"
  href="#"
  target="_blank"
>
  Download MP3
</a>

<button
  class="btn btn-outline"
  onclick="copyLink()"
>
  Copy Link
</button>

</div>

<div id="playlist-box">

<h2 id="playlist-name"></h2>

<p id="playlist-owner"></p>

<div id="playlist-tracks"></div>

</div>

<div class="json-viewer">

<pre id="result">
Waiting for request...
</pre>

</div>

</div>

<footer>

<p>
  eypzxdl
</p>

</footer>

</div>

<script>

const API =
  "https://eypz.koyeb.app";

const HEADERS = {
  "x-song-origin":
    "song-dl.eypz.in"
};

// AUTH

async function auth(){

  try{

    await fetch(
      `${API}/auth`,
      {
        method:"GET",
        credentials:"include",
        headers:HEADERS
      }
    );

  }catch(e){

    console.error(e);
  }
}

auth();

// STATUS

function showStatus(msg,type){

  const bar =
    document.getElementById(
      'status-bar'
    );

  bar.innerText = msg;

  bar.className = type;

  bar.style.display = 'block';

  if(type === 'success'){

    setTimeout(()=>{

      bar.style.display='none';

    },4000);
  }
}

// COPY

function copyLink(){

  const href =
    document.getElementById(
      'direct-dl'
    ).href;

  navigator.clipboard
    .writeText(href);

  showStatus(
    'Copied link',
    'success'
  );
}

// RESET

function resetUI(){

  document.getElementById(
    'song-info'
  ).style.display='none';

  document.getElementById(
    'song-actions'
  ).style.display='none';

  document.getElementById(
    'playlist-box'
  ).style.display='none';

  document.getElementById(
    'song-thumb'
  ).style.display='none';

  document.getElementById(
    'thumb-placeholder'
  ).style.display='flex';

  document.getElementById(
    'direct-dl'
  ).href='#';
}

// JSON HIGHLIGHT

function highlight(json){

  return JSON.stringify(
    json,
    null,
    2
  )

  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')

  .replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,

    function(match){

      let cls='json-num';

      if(/^"/.test(match)){

        cls=/:$/.test(match)
          ?'json-key'
          :'json-str';
      }

      else if(
        /true|false/.test(match)
      ){

        cls='json-bool';
      }

      else if(/null/.test(match)){

        cls='json-null';
      }

      return `
        <span class="${cls}">
          ${match}
        </span>
      `;
    }
  );
}

// SONG UI

function populateSong(data){

  const result =
    data.result || data;

  const title =
    result.title ||
    result.name ||
    "Unknown Title";

  const thumb =
    result.thumbnail ||
    "";

  const url =
    result.url ||
    result.link ||
    "";

  document.getElementById(
    'song-title'
  ).innerText = title;

  document.getElementById(
    'song-artist'
  ).innerText =
    result.duration ||
    'MP3 Audio';

  if(thumb){

    const img =
      document.getElementById(
        'song-thumb'
      );

    img.src = thumb;

    img.style.display='block';

    document.getElementById(
      'thumb-placeholder'
    ).style.display='none';
  }

  if(url){

    document.getElementById(
      'direct-dl'
    ).href = url;

    document.getElementById(
      'song-actions'
    ).style.display='flex';
  }

  document.getElementById(
    'song-info'
  ).style.display='flex';
}

// PLAYLIST UI

function populatePlaylist(data){

  const result =
    data.result;

  const box =
    document.getElementById(
      'playlist-box'
    );

  const tracks =
    document.getElementById(
      'playlist-tracks'
    );

  tracks.innerHTML='';

  document.getElementById(
    'playlist-name'
  ).innerText =
    result.info.name;

  document.getElementById(
    'playlist-owner'
  ).innerText =
    `by ${result.info.owner}`;

  box.style.display='block';

  result.tracks.forEach(track=>{

    const div =
      document.createElement('div');

    div.className =
      'playlist-track';

    div.innerHTML = `
      <div>
        <strong>
          ${track.name}
        </strong>

        <p>
          ${track.artist}
        </p>
      </div>

      <button
        class="btn btn-download"
        onclick="downloadTrack('${(track.name+' '+track.artist).replace(/'/g,"\\'")}')"
      >
        Download
      </button>
    `;

    tracks.appendChild(div);
  });
}

// TRACK DOWNLOAD

async function downloadTrack(query){

  try{

    showStatus(
      'Fetching track...',
      'success'
    );

    const res =
      await fetch(
        `${API}/api/dl?q=${encodeURIComponent(query)}`,
        {
          method:"GET",
          credentials:"include",
          headers:HEADERS
        }
      );

    const data =
      await res.json();

    if(!data.status){

      return showStatus(
        data.message,
        'error'
      );
    }

    window.open(
      data.result.url,
      '_blank'
    );

  }catch(err){

    showStatus(
      err.message,
      'error'
    );
  }
}

// MAIN DOWNLOAD

async function downloadSong(){

  const q =
    document.getElementById(
      'query'
    ).value.trim();

  if(!q){

    return showStatus(
      'Enter a query',
      'error'
    );
  }

  resetUI();

  const btn =
    document.getElementById(
      'download-btn'
    );

  const spinner =
    document.getElementById(
      'spinner'
    );

  const card =
    document.getElementById(
      'result-card'
    );

  const pre =
    document.getElementById(
      'result'
    );

  btn.disabled=true;

  spinner.style.display='flex';

  card.style.display='none';

  try{

    let endpoint='/api/dl';

    let param='q';

    if(
      q.includes(
        'spotify.com/playlist/'
      )
    ){

      endpoint='/api/playlist';

      param='url';
    }

    const res =
      await fetch(
        `${API}${endpoint}?${param}=${encodeURIComponent(q)}`,
        {
          method:'GET',
          credentials:'include',
          headers:HEADERS
        }
      );

    const data =
      await res.json();

    spinner.style.display='none';

    card.style.display='block';

    pre.innerHTML =
      highlight(data);

    if(!data.status){

      return showStatus(
        data.message ||
        'Failed',
        'error'
      );
    }

    if(
      endpoint.includes(
        'playlist'
      )
    ){

      populatePlaylist(data);

      showStatus(
        'Playlist fetched',
        'success'
      );

    }else{

      populateSong(data);

      showStatus(
        'Song fetched',
        'success'
      );
    }

  }catch(err){

    spinner.style.display='none';

    card.style.display='block';

    pre.innerText =
      err.message;

    showStatus(
      err.message,
      'error'
    );

  }finally{

    btn.disabled=false;
  }
}

// ENTER

document
  .getElementById(
    'query'
  )

  .addEventListener(
    'keydown',

    e=>{

      if(e.key==='Enter'){

        downloadSong();
      }
    }
  );

</script>

</body>
</html>
